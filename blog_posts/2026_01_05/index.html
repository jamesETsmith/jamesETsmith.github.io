<!-- setup file to display the tags_v2.graphml file with sigma.js -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma.js Graph</title>
    <!-- Graphology and Sigma -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/2.4.0/sigma.min.js"></script>

    <!-- Graphology Library (includes Layouts, Communities, etc.) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology-library/0.8.0/graphology-library.min.js"></script>

    <!-- Fallback for ForceAtlas2 if not in library (sometimes separate) -->
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/graphology-layout-forceatlas2/0.10.1/graphology-layout-forceatlas2.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
        }

        #controls {
            margin-bottom: 10px;
        }

        #sigma-container {
            width: 800px;
            height: 600px;
            border: 1px solid black;
        }

        #tooltip {
            position: absolute;
            display: none;
            background-color: white;
            border: 1px solid #ccc;
            padding: 5px;
            border-radius: 4px;
            pointer-events: none;
            /* Let clicks pass through */
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div id="controls">
        <button id="layout-random">Random Layout</button>
        <button id="layout-circular">Circular Layout</button>
        <button id="layout-forceatlas2">ForceAtlas2 Layout</button>
        <button id="color-clusters">Color Clusters (Louvain)</button>
        <button id="color-categories">Color by Category</button>
    </div>
    <div id="sigma-container"></div>
    <div id="tooltip"></div>
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            // Load the graph data
            fetch('graph_data.json')
                .then(response => response.json())
                .then(data => {

                    // Create a new Graphology graph
                    const graph = new graphology.Graph();

                    // Store initial category colors for restoration
                    const initialColors = {};

                    // Import data manually to ensure full control
                    data.nodes.forEach(node => {
                        initialColors[node.id] = node.color; // Store initial color

                        graph.addNode(node.id, {
                            label: node.label,
                            // Ensure x and y are numbers. If missing from JSON, use random.
                            x: typeof node.x === 'number' ? node.x : Math.random(),
                            y: typeof node.y === 'number' ? node.y : Math.random(),
                            size: 1, // Default size, will be updated based on degree
                            color: node.color,
                            category: node.category // Add category to attributes
                        });
                    });

                    data.edges.forEach(edge => {
                        // Check if edge already exists to avoid errors in undirected graphs if duplicates exist
                        if (!graph.hasEdge(edge.source, edge.target)) {
                            graph.addEdge(edge.source, edge.target, {
                                size: edge.size,
                                color: edge.color,
                                tweet_link: edge.tweet_link
                            });
                        }
                    });

                    // Update node sizes based on degree
                    graph.forEachNode((node, attributes) => {
                        const degree = graph.degree(node);
                        // Scale size: base size 3 + log(degree + 1) * multiplier
                        // You can adjust the formula as needed
                        graph.setNodeAttribute(node, 'size', 3 + Math.sqrt(degree) * 2);
                    });

                    // Create the sigma instance
                    const container = document.getElementById('sigma-container');
                    const tooltip = document.getElementById('tooltip');

                    const renderer = new Sigma(graph, container, {
                        // Enable edge events
                        enableEdgeEvents: true,
                        edgeHoverColor: '#888',
                        edgeHoverSizeRatio: 2
                    });

                    // --- Layout Logic ---

                    const randomLayout = () => {
                        graph.forEachNode(node => {
                            graph.setNodeAttribute(node, 'x', Math.random());
                            graph.setNodeAttribute(node, 'y', Math.random());
                        });
                    };

                    const circularLayout = () => {
                        // Try using graphologyLibrary.layout.circular
                        if (window.graphologyLibrary && window.graphologyLibrary.layout && window.graphologyLibrary.layout.circular) {
                            window.graphologyLibrary.layout.circular.assign(graph);
                        } else {
                            // Fallback manual circular layout
                            console.log('Using fallback circular layout');
                            const nodes = graph.nodes();
                            const radius = 10;
                            nodes.forEach((node, i) => {
                                const angle = (i * 2 * Math.PI) / nodes.length;
                                graph.setNodeAttribute(node, 'x', radius * Math.cos(angle));
                                graph.setNodeAttribute(node, 'y', radius * Math.sin(angle));
                            });
                        }
                    };

                    const forceAtlas2Layout = () => {
                        // Check for forceAtlas2 in library or global
                        let fa2 = null;
                        if (window.graphologyLibrary && window.graphologyLibrary.layout && window.graphologyLibrary.layout.forceAtlas2) {
                            fa2 = window.graphologyLibrary.layout.forceAtlas2;
                        } else if (window.graphologyLayoutForceAtlas2) {
                            fa2 = window.graphologyLayoutForceAtlas2;
                        }

                        if (fa2) {
                            console.log('Running ForceAtlas2...');
                            fa2.assign(graph, {
                                iterations: 50,
                                settings: {
                                    gravity: 1
                                }
                            });
                        } else {
                            console.error("ForceAtlas2 layout library not found. Checked graphologyLibrary and global.");
                        }
                    };

                    const colorClusters = () => {
                        // Check for louvain in library
                        let louvain = null;
                        if (window.graphologyLibrary && window.graphologyLibrary.communities && window.graphologyLibrary.communities.louvain) {
                            louvain = window.graphologyLibrary.communities.louvain;
                        }

                        if (louvain) {
                            console.log('Running Louvain...');
                            // Assign communities
                            louvain.assign(graph);

                            // Map community ID to color
                            const colors = [
                                '#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33A1',
                                '#A133FF', '#33FFF6', '#FF8C33', '#8C33FF', '#33FF8C'
                            ];

                            const communityColors = {};
                            let colorIndex = 0;

                            graph.forEachNode(node => {
                                const community = graph.getNodeAttribute(node, 'community');
                                if (communityColors[community] === undefined) {
                                    communityColors[community] = colors[colorIndex % colors.length];
                                    colorIndex++;
                                }
                                graph.setNodeAttribute(node, 'color', communityColors[community]);
                            });

                        } else {
                            console.error("Louvain library not found in graphologyLibrary.");
                            console.log("graphologyLibrary:", window.graphologyLibrary);
                        }
                    };

                    const colorByCategories = () => {
                        graph.forEachNode(node => {
                            if (initialColors[node]) {
                                graph.setNodeAttribute(node, 'color', initialColors[node]);
                            }
                        });
                    };

                    // Bind buttons
                    document.getElementById('layout-random').addEventListener('click', randomLayout);
                    document.getElementById('layout-circular').addEventListener('click', circularLayout);
                    document.getElementById('layout-forceatlas2').addEventListener('click', forceAtlas2Layout);
                    document.getElementById('color-clusters').addEventListener('click', colorClusters);
                    document.getElementById('color-categories').addEventListener('click', colorByCategories);

                    // --- Tooltip Logic ---

                    renderer.on('enterEdge', (event) => {
                        const edgeId = event.edge;
                        const attributes = graph.getEdgeAttributes(edgeId);
                        if (attributes.tweet_link) {
                            tooltip.style.display = 'block';
                            tooltip.innerHTML = `<a href="${attributes.tweet_link}" target="_blank">View Tweet</a>`;
                        }
                    });

                    // We need mouse move on container to position tooltip because enterEdge might not give mouse coords continuously
                    container.addEventListener('mousemove', (e) => {
                        if (tooltip.style.display === 'block') {
                            const rect = container.getBoundingClientRect();
                            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                            tooltip.style.top = (e.clientY - rect.top + 15) + 'px';
                        }
                    });

                    renderer.on('leaveEdge', () => {
                        tooltip.style.display = 'none';
                    });

                })
                .catch(error => console.error('Error loading or parsing graph data:', error));
        });
    </script>
</body>

</html>

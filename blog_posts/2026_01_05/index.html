<!-- setup file to display the tags_v2.graphml file with sigma.js -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma.js Graph</title>
    <!-- Graphology and Sigma -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/2.4.0/sigma.min.js"></script>

    <!-- Graphology Library (includes Layouts) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology-library/0.8.0/graphology-library.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
        }

        #controls {
            margin-bottom: 10px;
        }

        #sigma-container {
            width: 800px;
            height: 600px;
            border: 1px solid black;
        }

        #tooltip {
            position: absolute;
            display: none;
            background-color: white;
            border: 1px solid #ccc;
            padding: 5px;
            border-radius: 4px;
            pointer-events: none;
            /* Let clicks pass through */
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div id="controls">
        <button id="layout-random">Random Layout</button>
        <button id="layout-circular">Circular Layout</button>
    </div>
    <div id="sigma-container"></div>
    <div id="tooltip"></div>
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            // Load the graph data
            fetch('graph_data.json')
                .then(response => response.json())
                .then(data => {

                    // Create a new Graphology graph
                    const graph = new graphology.Graph();

                    // Import data manually
                    data.nodes.forEach(node => {
                        graph.addNode(node.id, {
                            label: node.label,
                            x: typeof node.x === 'number' ? node.x : Math.random(),
                            y: typeof node.y === 'number' ? node.y : Math.random(),
                            size: 1,
                            color: node.color,
                            originalColor: node.color, // Store original color
                            category: node.category
                        });
                    });

                    data.edges.forEach(edge => {
                        if (!graph.hasEdge(edge.source, edge.target)) {
                            graph.addEdge(edge.source, edge.target, {
                                size: edge.size,
                                color: edge.color,
                                originalColor: edge.color, // Store original color
                                tweet_link: edge.tweet_link
                            });
                        }
                    });

                    // Update node sizes based on degree
                    graph.forEachNode((node, attributes) => {
                        const degree = graph.degree(node);
                        graph.setNodeAttribute(node, 'size', 3 + Math.sqrt(degree) * 2);
                    });

                    // Create the sigma instance
                    const container = document.getElementById('sigma-container');
                    const tooltip = document.getElementById('tooltip');

                    const renderer = new Sigma(graph, container, {
                        // Enable edge events
                        enableEdgeEvents: true,
                        edgeHoverColor: '#888',
                        edgeHoverSizeRatio: 2,
                        // Render settings
                        labelRenderedSizeThreshold: 6 // Only show labels when nodes are big enough or hovered
                    });

                    // --- Layout Logic ---

                    const randomLayout = () => {
                        graph.forEachNode(node => {
                            graph.setNodeAttribute(node, 'x', Math.random());
                            graph.setNodeAttribute(node, 'y', Math.random());
                        });
                    };

                    const circularLayout = () => {
                        if (window.graphologyLibrary && window.graphologyLibrary.layout && window.graphologyLibrary.layout.circular) {
                            window.graphologyLibrary.layout.circular.assign(graph);
                        } else {
                            const nodes = graph.nodes();
                            const radius = 10;
                            nodes.forEach((node, i) => {
                                const angle = (i * 2 * Math.PI) / nodes.length;
                                graph.setNodeAttribute(node, 'x', radius * Math.cos(angle));
                                graph.setNodeAttribute(node, 'y', radius * Math.sin(angle));
                            });
                        }
                    };

                    // Bind buttons
                    document.getElementById('layout-random').addEventListener('click', randomLayout);
                    document.getElementById('layout-circular').addEventListener('click', circularLayout);

                    // --- Interaction Logic (Hover Neighbors) ---

                    let hoveredNode = undefined;
                    let hoveredNeighbors = undefined;

                    // Bind node hover events
                    renderer.on("enterNode", ({ node }) => {
                        hoveredNode = node;
                        hoveredNeighbors = new Set(graph.neighbors(node));

                        // Force refresh to apply the "reducer" logic below
                        renderer.refresh();
                    });

                    renderer.on("leaveNode", () => {
                        hoveredNode = undefined;
                        hoveredNeighbors = undefined;

                        // Force refresh to reset
                        renderer.refresh();
                    });

                    // Use reducers to handle visual state efficiently
                    renderer.setSetting("nodeReducer", (node, data) => {
                        const res = { ...data };

                        // If a node is hovered, grey out nodes that are not neighbors
                        if (hoveredNode && node !== hoveredNode && !hoveredNeighbors.has(node)) {
                            res.label = "";
                            res.color = "#f6f6f6"; // Dimmed color
                            res.zIndex = 0; // Put in back
                        } else if (hoveredNode) {
                            // Highlight hovered node and neighbors
                            res.zIndex = 10; // Bring to front
                        }

                        return res;
                    });

                    renderer.setSetting("edgeReducer", (edge, data) => {
                        const res = { ...data };

                        // If a node is hovered, grey out edges not connected to it
                        if (hoveredNode && !graph.hasExtremity(edge, hoveredNode)) {
                            res.hidden = true; // Or set color to very light grey
                            // res.color = "#f6f6f6";
                        }
                        return res;
                    });

                    // --- Tooltip Logic (Edges) ---

                    renderer.on('enterEdge', (event) => {
                        const edgeId = event.edge;
                        const attributes = graph.getEdgeAttributes(edgeId);
                        if (attributes.tweet_link) {
                            tooltip.style.display = 'block';
                            tooltip.innerHTML = `<a href="${attributes.tweet_link}" target="_blank">View Tweet</a>`;
                        }
                    });

                    container.addEventListener('mousemove', (e) => {
                        if (tooltip.style.display === 'block') {
                            const rect = container.getBoundingClientRect();
                            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                            tooltip.style.top = (e.clientY - rect.top + 15) + 'px';
                        }
                    });

                    renderer.on('leaveEdge', () => {
                        tooltip.style.display = 'none';
                    });

                })
                .catch(error => console.error('Error loading or parsing graph data:', error));
        });
    </script>
</body>

</html>
